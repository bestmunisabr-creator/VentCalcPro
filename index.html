<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VentCalcPro</title><link rel="stylesheet" href="style.css">
</head>

<body>

<h1>VentCalcPro</h1>

<p>Калькулятор вентиляции</p>

<div class="calculator">

    <label>Площадь помещения (м²):</label>
    <input type="number" id="area" placeholder="Введите площадь">

    <label>Высота потолка (м):</label>
    <input type="number" id="height" placeholder="Введите высоту">

    <button onclick="calculate()">Рассчитать</button>

    <h2 id="result"></h2>

</div>
<script>
function calculate() {

    let area = document.getElementById("area").value;
    let height = document.getElementById("height").value;

    let volume = area * height;
    let air = volume * 3;

    document.getElementById("result").innerHTML =
    "Необходимый воздухообмен: " + air + " м³/ч";
}
</script>
</body>
</html>
